<html lang="es">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111827;font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* SIDEBAR */
.sb{width:225px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:14px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px}
.logo-ic{font-size:26px;background:#e8f5ee;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-n{font-size:14px;font-weight:700;color:#0f4a27}
.logo-s{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.cj{padding:8px 14px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
.cj:hover{background:#f9fafb}
.cj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#991b1b}
.sec{padding:12px 14px 3px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.7px}
.nav{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:13px;color:#374151;transition:background .1s;user-select:none}
.nav:hover{background:#f9fafb}
.nav.on{background:#e8f5ee;color:#0f4a27;font-weight:700}
.nav.r{color:#991b1b}
.nav i{font-size:16px;width:18px;flex-shrink:0}
.nbg{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:20px;background:#fee2e2;color:#991b1b;font-weight:700}
.sb-sp{flex:1}
/* MAIN */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
.topbar-t{font-size:16px;font-weight:700;flex:1}
.cnt{flex:1;overflow-y:auto;padding:16px;background:#f3f4f6}
/* CARDS */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:12px}
.card-t{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.5px;flex-wrap:wrap;gap:6px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
/* METRICS */
.met{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px}
.met-l{font-size:10px;color:#6b7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.met-v{font-size:22px;font-weight:700;line-height:1}
.met-s{font-size:11px;color:#6b7280;margin-top:4px}
/* BADGES */
.bd{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.bd-ok{background:#d1fae5;color:#065f46}
.bd-w{background:#fef3c7;color:#92400e}
.bd-d{background:#fee2e2;color:#991b1b}
.bd-i{background:#dbeafe;color:#1e40af}
.bd-g{background:#f3f4f6;color:#6b7280}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid #e5e7eb;color:#6b7280;display:inline-block}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;font-size:13px;background:#fff;color:#374151;font-family:inherit;white-space:nowrap;transition:all .15s;font-weight:600}
.btn:hover{background:#f9fafb}
.btn-g{background:#0f4a27;color:#fff;border-color:transparent}.btn-g:hover{background:#0d3d21}
.btn-p{background:#1e40af;color:#fff;border-color:transparent}.btn-p:hover{background:#1d3fa0}
.btn-s{background:#065f46;color:#fff;border-color:transparent}.btn-s:hover{background:#054f39}
.btn-w{background:#92400e;color:#fff;border-color:transparent}
.btn-d{background:#991b1b;color:#fff;border-color:transparent}.btn-d:hover{background:#7f1d1d}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn-fl{width:100%;justify-content:center}
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;color:#6b7280;border-bottom:2px solid #e5e7eb;text-transform:uppercase;letter-spacing:.3px;background:#f9fafb;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.tbl tbody tr:last-child td{border:none}
.tbl tbody tr:hover td{background:#f9fafb}
.tw{overflow-x:auto}
.ta{display:flex;gap:4px}
/* FORMS */
.fr{display:grid;gap:10px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px}
.fi{padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:#fff;color:#111827;font-family:inherit;width:100%;transition:border .15s}
.fi:focus{outline:none;border-color:#1a6b3a;box-shadow:0 0 0 3px rgba(26,107,58,.1)}
.fi[readonly]{background:#f9fafb;color:#6b7280}
.fi-s{background:#d1fae5!important;color:#065f46!important;font-weight:700;border-color:#6ee7b7!important}
.fi-i{background:#dbeafe!important;color:#1e40af!important;font-weight:700;border-color:#93c5fd!important}
.fi-d{background:#fee2e2!important;color:#991b1b!important;font-weight:700;border-color:#fca5a5!important}
/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.mo{background:#fff;border-radius:10px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo-t{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.mo-f{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
/* ALERTS */
.al{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:6px;margin-bottom:8px;font-size:13px;font-weight:500}
.al i{flex-shrink:0;margin-top:1px}
.al-d{background:#fee2e2;color:#991b1b}
.al-w{background:#fef3c7;color:#92400e}
.al-s{background:#d1fae5;color:#065f46}
.al-i{background:#dbeafe;color:#1e40af}
/* MISC */
.dv{height:1px;background:#e5e7eb;margin:12px 0}
.empty{text-align:center;padding:28px;color:#9ca3af;font-size:13px}
.cs{color:#065f46}.cd{color:#991b1b}.cw{color:#92400e}.ci{color:#1e40af}.cm{color:#6b7280}
.fw6{font-weight:600}.fw7{font-weight:700}
.bar{background:#e5e7eb;border-radius:20px;height:6px;flex:1;min-width:40px}
.bar-f{height:6px;border-radius:20px}
.tabs{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:14px}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none;font-weight:500}
.tab:hover{color:#111827;background:#f9fafb}
.tab.on{color:#0f4a27;border-color:#0f4a27;font-weight:700;background:#e8f5ee}
.blt{font-family:'Courier New',monospace;font-size:11.5px;background:#f9fafb;padding:14px;border-radius:6px;white-space:pre;line-height:1.8;border:1px dashed #d1d5db;overflow-x:auto}
.fl-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.fl-row:last-child{border:none}
.vrow{display:grid;grid-template-columns:2fr 70px 95px 95px 30px;gap:8px;align-items:end;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="logo">
      <div class="logo-ic">🐾</div>
      <div>
        <div class="logo-n">Cachorritos</div>
        <div class="logo-s">De la Chacra a tu Olla</div>
      </div>
    </div>
    <div class="cj" onclick="go('caja')">
      <span class="cj-dot" id="cj-dot"></span>
      <span id="cj-txt" style="color:#6b7280">Caja cerrada</span>
    </div>
    <div class="sec">Operaciones</div>
    <div class="nav" data-p="dashboard"><i class="ti ti-layout-dashboard"></i>Dashboard</div>
    <div class="nav" data-p="caja"><i class="ti ti-cash-register"></i>Caja del día</div>
    <div class="nav" data-p="ventas"><i class="ti ti-shopping-cart"></i>Ventas</div>
    <div class="sec">Inventario</div>
    <div class="nav" data-p="inventario"><i class="ti ti-package"></i>Inventario</div>
    <div class="sec">Clientes</div>
    <div class="nav" data-p="clientes"><i class="ti ti-users"></i>Clientes y cobros<span class="nbg" id="cq-b" style="display:none">0</span></div>
    <div class="sec">Proveedores</div>
    <div class="nav" data-p="provs"><i class="ti ti-truck"></i>Proveedores</div>
    <div class="sec">Análisis</div>
    <div class="nav" data-p="reportes"><i class="ti ti-chart-bar"></i>Reportes</div>
    <div class="nav" data-p="boletas"><i class="ti ti-receipt"></i>Boletas</div>
    <div class="sb-sp"></div>
    <div style="height:1px;background:#e5e7eb"></div>
    <div class="nav r" onclick="cierreDia()"><i class="ti ti-moon"></i>Cerrar día</div>
  </aside>
  <main class="mn">
    <div class="topbar">
      <span class="topbar-t" id="tt">Dashboard</span>
      <button class="btn btn-g" id="tb" style="display:none" onclick="topAct()">
        <i class="ti ti-plus"></i><span id="tbl">Acción</span>
      </button>
    </div>
    <div class="cnt" id="cnt"><div class="empty">Cargando...</div></div>
  </main>
</div>
<div id="MR"></div>

<script>
// ── UTILS ──
function $(id){return document.getElementById(id);}
function M(h){$('MR').innerHTML=h;}
function cM(){M('');}
function hoy(){return new Date().toISOString().split('T')[0];}
function hora(){return new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});}
function dDesde(f){return Math.max(0,Math.floor((new Date()-new Date(f))/864e5));}
function mon(v){return 'S/ '+Number(v||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pct(v,t){return t?Math.min(100,Math.round(v/t*100)):0;}
var NID=300;
function nid(){NID++;return NID;}

// ── ESTADO ──
var S={
  pg:'dashboard',tab:'',
  neg:{nom:'Cachorritos',sl:'De la Chacra a tu Olla',ruc:'10456789012',dir:'Mercado Santa Rosa, Puesto 14',tel:'987-654-321'},
  caja:{open:false,fecha:null,ini:0,gastos:[]},
  stMin:12,
  prods:[
    {id:1,nom:'Yungay A1',cat:'Papa',qty:80,costo:85,pMay:105,pMin:120,prov:'Don Raúl',fIng:'2025-05-10',dAl:7},
    {id:2,nom:'Yungay A2',cat:'Papa',qty:60,costo:80,pMay:100,pMin:115,prov:'Don Raúl',fIng:'2025-05-10',dAl:7},
    {id:3,nom:'Canchan',cat:'Papa',qty:45,costo:90,pMay:110,pMin:125,prov:'Familia Quispe',fIng:'2025-05-11',dAl:10},
    {id:4,nom:'Huayro',cat:'Papa',qty:30,costo:100,pMay:120,pMin:140,prov:'Familia Quispe',fIng:'2025-05-11',dAl:10},
    {id:5,nom:'Papa Amarilla',cat:'Papa',qty:20,costo:120,pMay:145,pMin:165,prov:'Don Raúl',fIng:'2025-05-12',dAl:5},
    {id:6,nom:'Camote',cat:'Camote',qty:15,costo:50,pMay:63,pMin:75,prov:'Mercado Central',fIng:'2025-05-12',dAl:8},
    {id:7,nom:'Yuca',cat:'Yuca',qty:8,costo:40,pMay:52,pMin:62,prov:'Familia Quispe',fIng:'2025-05-09',dAl:7},
  ],
  ventas:[
    {id:1,items:[{nom:'Yungay A1',pid:1,qty:5,precio:120,costo:85}],tipo:'minorista',cli:'Mostrador',pago:'contado',total:600,costoT:425,util:175,fecha:'2025-05-14',hora:'08:30',anu:false,motAnu:''},
    {id:2,items:[{nom:'Papa Amarilla',pid:5,qty:3,precio:165,costo:120}],tipo:'minorista',cli:'Rosa Mamani',pago:'yape',total:495,costoT:360,util:135,fecha:'2025-05-14',hora:'09:15',anu:false,motAnu:''},
    {id:3,items:[{nom:'Canchan',pid:3,qty:10,precio:110,costo:90}],tipo:'mayorista',cli:'Bodega El Sol',pago:'crédito',total:1100,costoT:900,util:200,fecha:'2025-05-13',hora:'14:00',anu:false,motAnu:''},
    {id:4,items:[{nom:'Huayro',pid:4,qty:4,precio:140,costo:100}],tipo:'minorista',cli:'Mostrador',pago:'contado',total:560,costoT:400,util:160,fecha:'2025-05-13',hora:'10:00',anu:false,motAnu:''},
  ],
  clis:[
    {id:1,nom:'Bodega El Sol',tipo:'mayorista',deuda:800,limC:2000,dSinP:5,cuotas:[{id:101,m:400,v:'2025-05-20',p:false},{id:102,m:400,v:'2025-06-01',p:false}],hist:[{f:'2025-05-01',m:1100,t:'deuda'},{f:'2025-05-10',m:300,t:'pago'}]},
    {id:2,nom:'Rosa Mamani',tipo:'minorista',deuda:320,limC:500,dSinP:9,cuotas:[{id:103,m:320,v:'2025-05-25',p:false}],hist:[{f:'2025-05-05',m:320,t:'deuda'}]},
    {id:3,nom:'Don Carlos',tipo:'mayorista',deuda:0,limC:3000,dSinP:0,cuotas:[],hist:[{f:'2025-04-20',m:600,t:'deuda'},{f:'2025-04-30',m:600,t:'pago'}]},
  ],
  provs:[
    {id:1,nom:'Don Raúl',tel:'987654321',dir:'Mercado Mayorista Lima',compras:[{id:1,f:'2025-05-10',det:'Yungay A1 x50, Yungay A2 x30',tot:6350,pag:true}]},
    {id:2,nom:'Familia Quispe',tel:'912345678',dir:'Huancayo',compras:[{id:3,f:'2025-05-11',det:'Canchan x45, Huayro x30',tot:7050,pag:false}]},
    {id:3,nom:'Mercado Central',tel:'956781234',dir:'Lima Centro',compras:[{id:4,f:'2025-05-12',det:'Camote x15',tot:750,pag:true}]},
  ],
  entradas:[
    {id:1,pNom:'Yungay A1',qty:80,cu:85,ct:6800,prov:'Don Raúl',f:'2025-05-10'},
    {id:2,pNom:'Papa Amarilla',qty:20,cu:120,ct:2400,prov:'Don Raúl',f:'2025-05-12'},
  ],
  mermas:[{id:1,pNom:'Yuca',pid:7,qty:2,mot:'podrido',f:'2025-05-14'}],
  ajustes:[],
};

// ── HELPERS HTML ──
function h_met(label,valor,sub,cls){
  return '<div class="met"><div class="met-l">'+label+'</div><div class="met-v '+(cls||'')+'">'+valor+'</div><div class="met-s">'+(sub||'')+'</div></div>';
}
function h_frow(label,valor,cls){
  return '<div class="fl-row"><span class="cm">'+label+'</span><span class="fw6 '+(cls||'')+'">'+valor+'</span></div>';
}
function h_badge(txt,cls){return '<span class="bd '+cls+'">'+txt+'</span>';}
function h_tag(txt){return '<span class="tag">'+txt+'</span>';}
function h_btn(txt,cls,onclick){return '<button class="btn '+cls+'" onclick="'+onclick+'">'+txt+'</button>';}
function h_al(txt,cls){return '<div class="al '+cls+'"><i class="ti ti-alert-triangle"></i><span>'+txt+'</span></div>';}

// ── ALERTAS ──
function alertN(){
  var n=0;
  S.prods.forEach(function(p){if(p.qty<S.stMin)n++;if(dDesde(p.fIng)>=p.dAl)n++;});
  S.clis.forEach(function(c){c.cuotas.forEach(function(q){if(!q.p&&new Date(q.v)<=new Date(Date.now()+3*864e5))n++;});});
  return n;
}

// ── NAVEGACIÓN ──
var pgCfg={
  dashboard:{t:'Panel principal',btn:'Nueva venta'},
  caja:{t:'Caja del día',btn:null},
  ventas:{t:'Ventas',btn:'Nueva venta'},
  inventario:{t:'Inventario',btn:'Agregar producto'},
  clientes:{t:'Clientes y cobros',btn:'Nuevo cliente'},
  provs:{t:'Proveedores',btn:'Nuevo proveedor'},
  reportes:{t:'Reportes',btn:null},
  boletas:{t:'Boletas',btn:null},
};

function go(pg,tab){
  S.pg=pg; S.tab=tab||'';
  var c=pgCfg[pg]||{t:pg,btn:null};
  $('tt').textContent=c.t;
  var b=$('tb');
  if(c.btn){b.style.display='';$('tbl').textContent=c.btn;}
  else b.style.display='none';
  document.querySelectorAll('.nav[data-p]').forEach(function(el){
    el.classList.toggle('on',el.dataset.p===pg);
  });
  var op=S.caja.open;
  $('cj-dot').style.background=op?'#065f46':'#991b1b';
  $('cj-txt').textContent=op?'Caja abierta':'Caja cerrada';
  $('cj-txt').style.color=op?'#065f46':'#6b7280';
  var cp=0;
  S.clis.forEach(function(c){c.cuotas.forEach(function(q){if(!q.p&&new Date(q.v)<=new Date(Date.now()+3*864e5))cp++;});});
  $('cq-b').textContent=cp; $('cq-b').style.display=cp?'':'none';
  rend();
}

function topAct(){
  if(S.pg==='dashboard'||S.pg==='ventas'){S.tab='nueva';rend();}
  else if(S.pg==='inventario')mNuevoProd();
  else if(S.pg==='clientes')mNuevoCli();
  else if(S.pg==='provs')mNuevoProv();
}

function rend(){
  var pages={dashboard:rDash,caja:rCaja,ventas:rVentas,inventario:rInv,clientes:rClis,provs:rProvs,reportes:rRep,boletas:rBoletas};
  var fn=pages[S.pg]||rDash;
  try{
    $('cnt').innerHTML=fn();
    if(S.pg==='ventas'&&(S.tab===''||S.tab==='nueva')){
      setTimeout(function(){upAll();calcV();},50);
    }
  }catch(e){
    $('cnt').innerHTML='<div class="card"><div style="color:#991b1b;font-weight:700;margin-bottom:8px">Error al cargar: '+e.message+'</div>'+
    '<button class="btn btn-g" onclick="go(\'dashboard\')">Ir al Dashboard</button></div>';
    console.error('Error render',S.pg,e);
  }
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════
function rDash(){
  var vH=S.ventas.filter(function(v){return v.fecha===hoy()&&!v.anu;});
  var tH=0,uH=0;
  vH.forEach(function(v){tH+=v.total;uH+=v.util;});
  var gH=0;
  S.caja.gastos.forEach(function(g){gH+=g.m;});
  var dT=0;
  S.clis.forEach(function(c){dT+=c.deuda;});
  var stTot=0;
  S.prods.forEach(function(p){stTot+=p.qty;});
  var stB=S.prods.filter(function(p){return p.qty<S.stMin;});
  var cuP=[];
  S.clis.forEach(function(c){c.cuotas.forEach(function(q){if(!q.p&&new Date(q.v)<=new Date(Date.now()+3*864e5))cuP.push({v:q.v,m:q.m,cn:c.nom});});});
  var pm={};
  S.ventas.filter(function(v){return !v.anu;}).forEach(function(v){
    v.items.forEach(function(i){pm[i.nom]=(pm[i.nom]||0)+i.qty;});
  });
  var top=Object.keys(pm).map(function(k){return{n:k,q:pm[k]};}).sort(function(a,b){return b.q-a.q;}).slice(0,5);
  var mx=top.length?top[0].q:1;

  // Ultimas ventas
  var vtm=S.ventas.filter(function(v){return !v.anu;}).slice(-4).reverse();
  var ventasHtml='';
  if(!vtm.length){ventasHtml='<div class="empty">Sin ventas registradas aún</div>';}
  else{
    vtm.forEach(function(v){
      var prods=v.items.map(function(i){return i.nom+' x'+i.qty;}).join(', ');
      ventasHtml+='<div class="fl-row"><div>'+

function addItem(){
  var idx=vIC++;
  var prodOpts=''; S.prods.forEach(function(p){prodOpts+='<option value="'+p.id+'">'+p.nom+' ('+p.qty+')</option>';});
  var d=document.createElement('div');
  d.className='vrow'; d.id='vr'+idx;
  d.innerHTML='<div class="fg"><label class="fl">Producto</label><select class="fi" id="vp'+idx+'" onchange="upPrice('+idx+')">'+prodOpts+'</select></div>'+
    '<div class="fg"><label class="fl">Cant.</label><input type="number" class="fi" id="vq'+idx+'" value="1" min="1" oninput="calcV()"></div>'+
    '<div class="fg"><label class="fl">Precio S/</label><input type="number" class="fi" id="vpr'+idx+'" oninput="calcV()"></div>'+
    '<div class="fg"><label class="fl">Subtotal</label><input class="fi fi-i" id="vs'+idx+'" readonly></div>'+
    '<div class="fg"><label class="fl" style="opacity:0">—</label><button class="btn btn-xs btn-d" onclick="remItem('+idx+')"><i class="ti ti-x"></i></button></div>';
  $('v-items').appendChild(d);
  upPrice(idx); calcV();
}

function remItem(i){var el=$('vr'+i);if(el){el.remove();calcV();}}

function upPrice(idx){
  var t=($('v-tipo')&&$('v-tipo').value)||'minorista';
  var sel=$('vp'+idx); if(!sel)return;
  var p=S.prods.filter(function(x){return x.id===parseInt(sel.value);})[0];
  if(p&&$('vpr'+idx))$('vpr'+idx).value=(t==='mayorista'?p.pMay:p.pMin);
  calcV();
}
function upAll(){for(var i=0;i<30;i++){if(!$('vp'+i))continue;upPrice(i);}calcV();}

function calcV(){
  var tot=0,cos=0;
  for(var i=0;i<30;i++){
    var pEl=$('vp'+i); if(!pEl)continue;
    var q=parseFloat(($('vq'+i)&&$('vq'+i).value)||0);
    var pr=parseFloat(($('vpr'+i)&&$('vpr'+i).value)||0);
    var p=S.prods.filter(function(x){return x.id===parseInt(pEl.value);})[0];
    var sub=q*pr; var sEl=$('vs'+i); if(sEl)sEl.value=mon(sub);
    tot+=sub; if(p)cos+=q*p.costo;
  }
  if($('vtot'))$('vtot').value=mon(tot);
  if($('vcos'))$('vcos').value=mon(cos);
  if($('vuti'))$('vuti').value=mon(tot-cos);
}

function saveV(boleta){
  var tipo=($('v-tipo')&&$('v-tipo').value)||'minorista';
  var cli=($('v-cli')&&$('v-cli').value)||'Mostrador';
  var pago=($('v-pago')&&$('v-pago').value)||'contado';
  var items=[]; var tot=0,cos=0;
  for(var i=0;i<30;i++){
    var pEl=$('vp'+i); if(!pEl)continue;
    var qty=parseInt(($('vq'+i)&&$('vq'+i).value)||0);
    var precio=parseFloat(($('vpr'+i)&&$('vpr'+i).value)||0);
    var p=S.prods.filter(function(x){return x.id===parseInt(pEl.value);})[0];
    if(!p||qty<1)continue;
    if(qty>p.qty){var mm=$('vmsg');if(mm){mm.textContent='Sin stock: '+p.nom+' ('+p.qty+' disp.)';mm.style.color='#991b1b';}return;}
    items.push({nom:p.nom,pid:p.id,qty:qty,precio:precio,costo:p.costo});
    tot+=qty*precio; cos+=qty*p.costo;
  }
  if(!items.length)return;
  items.forEach(function(it){var p=S.prods.filter(function(x){return x.id===it.pid;})[0];if(p)p.qty-=it.qty;});
  var nv={id:nid(),items:items,tipo:tipo,cli:cli,pago:pago,total:tot,costoT:cos,util:tot-cos,fecha:hoy(),hora:hora(),anu:false,motAnu:''};
  S.ventas.push(nv);
  if(pago==='crédito'||pago==='partes'){
    var c=S.clis.filter(function(x){return x.nom===cli;})[0];
    if(c){c.deuda+=tot;c.hist.push({f:hoy(),m:tot,t:'deuda'});}
  }
  vIC=1; saveLS();
  if(boleta){verBoleta(nv.id);}
  else{var mm=$('vmsg');if(mm){mm.textContent='✅ Venta registrada';mm.style.color='#065f46';}setTimeout(function(){rend();},900);}
}

function rListaClis(){
  var rows='';
  S.clis.forEach(function(c){

    var barColor=uso>=90?'#991b1b':uso>=70?'#92400e':'#1e40af';
    var est=c.deuda===0?h_badge('Al día','bd-ok'):c.dSinP>=7?h_badge('Moroso','bd-d'):h_badge('Con deuda','bd-w');
    var acciones=c.deuda>0?'<button class="btn btn-xs btn-g" onclick="mPago('+c.id+')"><i class="ti ti-cash"></i> Pago</button>':'';
    acciones+='<button class="btn btn-xs btn-p" onclick="mCuota('+c.id+')"><i class="ti ti-calendar"></i></button>';
    acciones+='<button class="btn btn-xs" onclick="mHistCli('+c.id+')"><i class="ti ti-list"></i></button>';
    rows+='<tr><td class="fw6">'+c.nom+'</td><td>'+h_tag(c.tipo)+'</td>'+
      '<td class="fw6 '+(c.deuda>0?'cd':'cs')+'">'+mon(c.deuda)+'</td>'+
      '<td class="cm">'+mon(c.limC)+'</td>'+
      '<td><div style="display:flex;align-items:center;gap:6px"><div class="bar" style="min-width:60px"><div class="bar-f" style="width:'+uso+'%;background:'+barColor+'"></div></div><span class="cm" style="font-size:11px">'+uso+'%</span></div></td>'+
      '<td class="'+(c.dSinP>=7?'cd':c.dSinP>=3?'cw':'')+' fw6">'+c.dSinP+'d</td>'+
      '<td>'+est+'</td><td class="ta">'+acciones+'</td></tr>';
  });
  var totD=0; S.clis.forEach(function(c){totD+=c.deuda;});
  return '<div class="card"><div class="card-t">Clientes <button class="btn btn-sm btn-g" onclick="mNuevoCli()"><i class="ti ti-plus"></i> Nuevo</button></div>'+
    '<div class="tw"><table class="tbl"><thead><tr><th>Cliente</th><th>Tipo</th><th>Deuda</th><th>Límite crédito</th><th>Uso</th><th>Días sin pago</th><th>Estado</th><th>Acciones</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+
    '<div class="dv"></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:13px">'+
      '<span class="cm">Total deuda pendiente:</span><span class="fw6 cd">'+mon(totD)+'</span>'+
    '</div></div>';
}

function rCuotas(){
  var now=new Date();
  var cuotas=[];
  S.clis.forEach(function(c){c.cuotas.forEach(function(q){cuotas.push({id:q.id,m:q.m,v:q.v,p:q.p,cn:c.nom,cid:c.id});});});
  cuotas.sort(function(a,b){return new Date(a.v)-new Date(b.v);});
  var pend=cuotas.filter(function(q){return !q.p;});
  var pag=cuotas.filter(function(q){return q.p;});
  var pendRows='';
  if(!pend.length){pendRows='<div class="empty">Sin cuotas pendientes ✅</div>';}
  else{
    var tblRows='';
    pend.forEach(function(q){
      var dH=Math.ceil((new Date(q.v)-now)/864e5);
      var vc=dH<0,pr=dH>=0&&dH<=3;
      var est=vc?h_badge('⚠ VENCIDA','bd-d'):pr?h_badge('Vence en '+dH+'d','bd-w'):h_badge('Pendiente','bd-g');
      tblRows+='<tr><td class="fw6">'+q.cn+'</td><td class="fw6">'+mon(q.m)+'</td><td>'+q.v+'</td><td>'+est+'</td>'+
        '<td><button class="btn btn-xs btn-s" onclick="pagCuota('+q.cid+','+q.id+')"><i class="ti ti-check"></i> Pagada</button></td></tr>';
    });
    pendRows='<div class="tw"><table class="tbl"><thead><tr><th>Cliente</th><th>Monto</th><th>Vence</th><th>Estado</th><th></th></tr></thead><tbody>'+tblRows+'</tbody></table></div>';
  }
  var pagRows='';
  if(pag.length){
    var pr2='';
    pag.forEach(function(q){pr2+='<tr><td>'+q.cn+'</td><td>'+mon(q.m)+'</td><td class="cm">'+q.v+'</td><td>'+h_badge('✓ Pagada','bd-ok')+'</td></tr>';});
    pagRows='<div class="dv"></div><div class="card-t">Cuotas pagadas '+h_badge(pag.length,'bd-ok')+'</div>'+
      '<div class="tw"><table class="tbl"><thead><tr><th>Cliente</th><th>Monto</th><th>Fecha</th><th></th></tr></thead><tbody>'+pr2+'</tbody></table></div>';
  }
  return '<div class="card"><div class="card-t">Cuotas pendientes '+h_badge(pend.length,'bd-d')+'</div>'+pendRows+pagRows+'</div>';
}

function rRep(){
  var t=S.tab||'flujo';
  var tabs='<div class="tabs">'+
    '<div class="tab '+(t==='flujo'?'on':'')+'" onclick="S.tab=\'flujo\';rend()">Flujo de caja</div>'+

function rFlujo(){
  var vA=S.ventas.filter(function(v){return !v.anu;});
  var ing=0,cr=0,vTot=0;
  vA.forEach(function(v){vTot+=v.total;if(v.pago==='crédito'||v.pago==='partes')cr+=v.total;else ing+=v.total;});
  var gas=0; S.caja.gastos.forEach(function(g){gas+=g.m;});
  var compT=0; S.provs.forEach(function(p){p.compras.forEach(function(c){compT+=c.tot;});});
  var compPend=0; S.provs.forEach(function(p){p.compras.forEach(function(c){if(!c.pag)compPend+=c.tot;});});
  var dT=0; S.clis.forEach(function(c){dT+=c.deuda;});
  var provRows='';
  S.provs.forEach(function(p){
    var t=0,pd=0; p.compras.forEach(function(c){t+=c.tot;if(!c.pag)pd+=c.tot;});
    provRows+='<div class="fl-row"><span class="fw6">'+p.nom+'</span><div style="text-align:right"><div class="fw6">'+mon(t)+'</div>'+(pd>0?'<div class="cd" style="font-size:11px">Pendiente: '+mon(pd)+'</div>':'')+'</div></div>';
  });
  return '<div class="g3">'+h_met('💰 Ingresos cobrados',mon(ing),'contado + yape','cs')+h_met('📤 Gastos',mon(gas),'del período','cd')+h_met('📊 Saldo neto',mon(ing-gas),'ingresos - gastos',ing-gas>=0?'cs':'cd')+'</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="card-t">Resumen de flujo</div>'+
        h_frow('+ Ventas cobradas','+'+mon(ing),'cs')+
        h_frow('⏳ Crédito pendiente',mon(cr),'cw')+
        h_frow('📋 Deudas de clientes',mon(dT),'cw')+
        h_frow('- Gastos del negocio','-'+mon(gas),'cd')+
        '<div class="fl-row" style="border:none;font-weight:700;font-size:14px"><span>Saldo real</span><span class="'+(ing-gas>=0?'cs':'cd')+'">'+mon(ing-gas)+'</span></div>'+
      '</div>'+
      '<div class="card"><div class="card-t">Compras a proveedores</div>'+provRows+
        '<div class="fl-row" style="border:none;font-weight:700"><span>Total compras</span><span class="cd">'+mon(compT)+'</span></div>'+
        (compPend>0?h_al('Debes a proveedores: <b>'+mon(compPend)+'</b>','al-d'):'')+
      '</div>'+
    '</div>';
}

function rUtil(){
  var vA=S.ventas.filter(function(v){return !v.anu;});
  var uT=0,vT=0,cT=0;
  vA.forEach(function(v){uT+=v.util;vT+=v.total;cT+=v.costoT;});
  var mg=vT>0?Math.round(uT/vT*100):0;
  var pm={};
  vA.forEach(function(v){v.items.forEach(function(i){
    if(!pm[i.nom])pm[i.nom]={qty:0,venta:0,costo:0,util:0};
    pm[i.nom].qty+=i.qty; pm[i.nom].venta+=i.qty*i.precio;
    pm[i.nom].costo+=i.qty*i.costo; pm[i.nom].util+=i.qty*(i.precio-i.costo);
  });});
  var arr=Object.keys(pm).map(function(k){return{n:k,d:pm[k]};}).sort(function(a,b){return b.d.util-a.d.util;});
  var mx=arr.length?arr[0].d.util:1;
  var rows='';
  arr.forEach(function(x,i){
    var mg2=x.d.venta>0?Math.round(x.d.util/x.d.venta*100):0;
    rows+='<tr><td class="cm">'+(i+1)+'</td><td class="fw6">'+x.n+'</td><td>'+x.d.qty+'</td>'+
      '<td>'+mon(x.d.venta)+'</td><td class="cd">'+mon(x.d.costo)+'</td>'+
      '<td class="cs fw6">+'+mon(x.d.util)+'</td><td class="cs fw6">'+mg2+'%</td>'+
      '<td><div style="display:flex;align-items:center;gap:6px"><div class="bar" style="min-width:80px"><div class="bar-f" style="width:'+pct(x.d.util,mx)+'%;background:#065f46"></div></div></div></td></tr>';
  });
  return '<div class="g3">'+h_met('📈 Utilidad bruta',mon(uT),'','cs')+h_met('📊 Margen general',mg+'%','','cs')+h_met('💸 Costo de ventas',mon(cT),'','cd')+'</div>'+
    '<div class="card"><div class="card-t">Utilidad por producto</div>'+
    '<div class="tw"><table class="tbl"><thead><tr><th>#</th><th>Producto</th><th>Sacos</th><th>Ingresos</th><th>Costo</th><th>Utilidad</th><th>Margen</th><th>Rendimiento</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div></div>';
}

function txtBoleta(v){
  if(!v)return'';
  var n=S.neg,L=32;
  function cen(t,w){w=w||L;var p=Math.max(0,Math.floor((w-t.length)/2));var sp='';for(var i=0;i<p;i++)sp+=' ';return sp+t;}
  function rpad(l,r,w){w=w||L;var sp=Math.max(1,w-l.length-r.length);var s='';for(var i=0;i<sp;i++)s+=' ';return l+s+r;}
  var sep=''; for(var i=0;i<L;i++)sep+='─';
  var prods='';
  v.items.forEach(function(it){
    var nm=it.nom.substring(0,13); while(nm.length<13)nm+=' ';
    var q=String(it.qty); while(q.length<2)q=' '+q;
    prods+=nm+' '+q+' x '+mon(it.precio)+'\n';
  });
  return cen(n.nom)+'\n'+cen(n.sl)+'\n'+cen('RUC: '+n.ruc)+'\n'+cen(n.dir)+'\n'+
    sep+'\n'+cen('COMPROBANTE DE VENTA')+'\n'+sep+'\n'+
    'Nº: '+String(v.id).padStart(5,'0')+'         '+v.fecha+'\n'+
    'Cliente: '+v.cli+'\n'+'Tipo: '+v.tipo+'   Pago: '+v.pago+'\n'+
    sep+'\n'+prods+sep+'\n'+
    rpad('TOTAL:',mon(v.total))+'\n'+rpad('UTILIDAD:','+'+mon(v.util))+'\n'+
    sep+'\n'+cen('¡Gracias por su compra!')+'\n'+cen('De la Chacra a tu Olla 🐾');
}

      '<div class="fg"><label class="fl">Fecha límite de pago</label><input type="date" class="fi" id="cu-v" value="'+pm.toISOString().split('T')[0]+'"></div>'+
    '</div>'+
    '<div class="mo-f">'+
      '<button class="btn btn-p btn-fl" onclick="saveCuota('+cid+')"><i class="ti ti-check"></i> Agregar cuota</button>'+
      '<button class="btn" onclick="cM()">Cancelar</button>'+
    '</div></div></div>');
}
function saveCuota(cid){
  var c=S.clis.filter(function(x){return x.id===cid;})[0];
  var m=parseFloat(($('cu-m')&&$('cu-m').value)||0);
  var v=($('cu-v')&&$('cu-v').value)||'';
  if(!c||m<=0||!v)return;
  c.cuotas.push({id:nid(),m:m,v:v,p:false});saveLS();cM();S.tab='cuotas';rend();
}
function pagCuota(cid,qid){
  var c=S.clis.filter(function(x){return x.id===cid;})[0];
  var q=c?c.cuotas.filter(function(x){return x.id===qid;})[0]:null;
  if(!c||!q)return;
  q.p=true;c.deuda=Math.max(0,c.deuda-q.m);
  c.hist.push({f:hoy(),m:q.m,t:'pago cuota'});saveLS();rend();
}
function mHistCli(cid){
  var c=S.clis.filter(function(x){return x.id===cid;})[0];if(!c)return;
  var rows='';
  c.hist.slice().reverse().forEach(function(h){
    var esPago=h.t.indexOf('pago')>=0;
    rows+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px">'+
      '<span class="cm">'+h.f+'</span>'+
      h_badge(h.t,esPago?'bd-ok':'bd-d')+
      '<span class="fw6 '+(esPago?'cs':'cd')+'">'+(esPago?'+':'-')+mon(h.m)+'</span>'+
    '</div>';
  });
  M('<div class="ov" onclick="if(event.target===this)cM()"><div class="mo">'+
    '<div class="mo-t"><i class="ti ti-list"></i> Historial — '+c.nom+'</div>'+
    '<div style="max-height:320px;overflow-y:auto">'+(rows||'<div class="empty">Sin movimientos</div>')+'</div>'+
    '<div class="mo-f"><button class="btn btn-fl" onclick="cM()">Cerrar</button></div>'+
  '</div></div>');
}

// MODALES — PROVEEDORES

    '<div class="fr c2" style="margin-bottom:12px">'+
      '<div class="fg"><label class="fl">Nombre</label><input class="fi" id="pv-n" placeholder="Nombre o empresa"></div>'+
      '<div class="fg"><label class="fl">Teléfono</label><input class="fi" id="pv-t" placeholder="9XXXXXXXX"></div>'+
      '<div class="fg"><label class="fl">Dirección / Origen</label><input class="fi" id="pv-d" placeholder="Ciudad o mercado"></div>'+

      '<button class="btn btn-g btn-fl" onclick="saveNuevoProv()"><i class="ti ti-check"></i> Guardar</button>'+
      '<button class="btn" onclick="cM()">Cancelar</button>'+
    '</div></div></div>');
}
function saveNuevoProv(){
  var n=($('pv-n')&&$('pv-n').value.trim())||'';if(!n)return;
  S.provs.push({id:nid(),nom:n,tel:($('pv-t')&&$('pv-t').value)||'—',dir:($('pv-d')&&$('pv-d').value)||'—',compras:[]});
  saveLS();cM();rend();
}
function mNuevaCompra(pvid){
  var pv=S.provs.filter(function(x){return x.id===pvid;})[0];if(!pv)return;
  M('<div class="ov" onclick="if(event.target===this)cM()"><div class="mo">'+
    '<div class="mo-t"><i class="ti ti-shopping-bag"></i> Nueva compra — '+pv.nom+'</div>'+
    '<div class="fg" style="margin-bottom:10px"><label class="fl">Detalle de lo comprado</label>'+
    '<textarea class="fi" id="cp-d" rows="3" placeholder="Ej: Yungay A1 x50 sacos..."></textarea></div>'+
    '<div class="fr c2" style="margin-bottom:12px">'+
      '<div class="fg"><label class="fl">Total pagado S/</label><input type="number" class="fi" id="cp-t" value="0" min="0"></div>'+
      '<div class="fg"><label class="fl">Estado de pago</label><select class="fi" id="cp-e"><option value="true">Pagado</option><option value="false">Pendiente</option></select></div>'+
      '<div class="fg"><label class="fl">Fecha</label><input type="date" class="fi" id="cp-f" value="'+hoy()+'"></div>'+
    '</div>'+
    '<div class="mo-f">'+
      '<button class="btn btn-g btn-fl" onclick="saveCompra('+pvid+')"><i class="ti ti-check"></i> Registrar</button>'+
      '<button class="btn" onclick="cM()">Cancelar</button>'+
    '</div></div></div>');
}
function saveCompra(pvid){
  var pv=S.provs.filter(function(x){return x.id===pvid;})[0];
  var det=($('cp-d')&&$('cp-d').value.trim())||'—';
  var tot=parseFloat(($('cp-t')&&$('cp-t').value)||0);
  var pag=($('cp-e')&&$('cp-e').value)==='true';
  var f=($('cp-f')&&$('cp-f').value)||hoy();
  if(!pv||tot<=0)return;
  pv.compras.push({id:nid(),f:f,det:det,tot:tot,pag:pag});
  saveLS();cM();S.tab='compras';rend();
}

// ══════════════════════════════════════════
// CIERRE DEL DÍA
// ══════════════════════════════════════════
function cierreDia(){
  var vH=S.ventas.filter(function(v){return v.fecha===hoy()&&!v.anu;});
  var tot=0,util=0,gas=0;
  vH.forEach(function(v){tot+=v.total;util+=v.util;});
  S.caja.gastos.forEach(function(g){gas+=g.m;});
  var pp={};
  vH.forEach(function(v){v.items.forEach(function(i){pp[i.nom]=(pp[i.nom]||0)+i.qty;});});
  var filas='';
  Object.keys(pp).forEach(function(n){filas+='<div class="fl-row"><span class="fw6">'+n+'</span><span>'+pp[n]+' sacos</span></div>';});
  if(!filas)filas='<div class="empty" style="padding:8px">Sin ventas hoy</div>';
  var clsNeta=util-gas>=0?'cs':'cd';
  M('<div class="ov" onclick="if(event.target===this)cM()"><div class="mo">'+
    '<div class="mo-t"><i class="ti ti-moon"></i> Resumen del día — '+hoy()+'</div>'+
    '<div class="g2" style="margin-bottom:12px">'+
      h_met('💰 Total vendido',mon(tot),'','')+
      h_met('📈 Utilidad bruta',mon(util),'','cs')+
      h_met('📤 Gastos del día',mon(gas),'','cd')+
      h_met('🎯 Ganancia neta',mon(util-gas),'',clsNeta)+
    '</div>'+
    '<div class="card-t" style="margin-bottom:8px">Desglose por producto</div>'+
    filas+
    '<div class="mo-f"><button class="btn btn-fl" onclick="cM()">Cerrar resumen</button></div>'+
  '</div></div>');
}

// ══════════════════════════════════════════
// EXPORTAR
// ══════════════════════════════════════════
function exportVentas(){
  if(typeof XLSX==='undefined'){alert('Espera 2 segundos y vuelve a intentar');return;}
  var d=[['Nº','Fecha','Hora','Productos','Cant.','Cliente','Tipo','Pago','Total S/','Costo S/','Utilidad S/','Margen %','Anulada']];
  S.ventas.forEach(function(v){
    var pr=v.items.map(function(i){return i.nom+' x'+i.qty;}).join(', ');
    var qt=v.items.reduce(function(a,i){return a+i.qty;},0);
    var mg=v.total>0?Math.round(v.util/v.total*100):0;
    d.push([String(v.id).padStart(5,'0'),v.fecha,v.hora,pr,qt,v.cli,v.tipo,v.pago,v.total,v.costoT,v.util,mg+'%',v.anu?'Sí':'No']);
  });
  var ws=XLSX.utils.aoa_to_sheet(d);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Ventas');XLSX.writeFile(wb,'cachorritos_ventas.xlsx');
}
function exportInv(){
  if(typeof XLSX==='undefined')return;
  var d=[['Producto','Cat.','Stock','Costo S/','P.Mayor S/','P.Minor S/','Margen%','Valor S/','Días almac.','Límite días','Estado']];
  S.prods.forEach(function(p){
    var dias=dDesde(p.fIng),mg=p.costo>0?Math.round((p.pMin-p.costo)/p.costo*100):0;
    var est=p.qty===0?'Agotado':p.qty<S.stMin?'Stock bajo':'OK';
    d.push([p.nom,p.cat,p.qty,p.costo,p.pMay,p.pMin,mg+'%',p.qty*p.costo,dias,p.dAl,est]);
  });
  var ws=XLSX.utils.aoa_to_sheet(d);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Inventario');XLSX.writeFile(wb,'cachorritos_inventario.xlsx');
}
function exportDeudas(){
  if(typeof XLSX==='undefined')return;
  var d=[['Cliente','Tipo','Deuda S/','Límite S/','Uso%','Días sin pago','Estado','Cuotas pendientes']];
  S.clis.forEach(function(c){
    var uso=c.limC>0?pct(c.deuda,c.limC):0;
    var est=c.deuda===0?'Al día':c.dSinP>=7?'Moroso':'Con deuda';
    var cp=c.cuotas.filter(function(q){return !q.p;}).length;
    d.push([c.nom,c.tipo,c.deuda,c.limC,uso+'%',c.dSinP,est,cp]);
  });
  var ws=XLSX.utils.aoa_to_sheet(d);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Deudas');XLSX.writeFile(wb,'cachorritos_deudas.xlsx');
}
function exportResumen(){
  var vA=S.ventas.filter(function(v){return !v.anu;});
  var tot=0,util=0,gas=0,dT=0;
  vA.forEach(function(v){tot+=v.total;util+=v.util;});
  S.caja.gastos.forEach(function(g){gas+=g.m;});
  S.clis.forEach(function(c){dT+=c.deuda;});
  var pm={};
  vA.forEach(function(v){v.items.forEach(function(i){pm[i.nom]=(pm[i.nom]||{q:0,u:0});pm[i.nom].q+=i.qty;pm[i.nom].u+=i.qty*(i.precio-i.costo);});});
  var L='═'.repeat(46);
  var txt=L+'\n      CACHORRITOS — DE LA CHACRA A TU OLLA\n      Reporte: '+hoy()+'\n'+L+'\n\n'+
    'RESUMEN FINANCIERO\n  Total vendido:     '+mon(tot)+'\n  Utilidad bruta:    '+mon(util)+'\n  Gastos:            '+mon(gas)+'\n  Ganancia neta:     '+mon(util-gas)+'\n  Deudas clientes:   '+mon(dT)+'\n\n'+
    'PRODUCTOS MÁS RENTABLES\n'+Object.keys(pm).map(function(n){return '  '+n+': '+pm[n].q+' sacos  Util: '+mon(pm[n].u);}).join('\n')+'\n\n'+
    'INVENTARIO\n'+S.prods.map(function(p){return '  '+p.nom+': '+p.qty+' sacos  Valor: '+mon(p.qty*p.costo);}).join('\n')+'\n\n'+
    'MERMAS\n'+(S.mermas.length?S.mermas.map(function(m){return '  '+m.f+' '+m.pNom+': '+m.qty+' sacos ('+m.mot+')';}).join('\n'):'  Sin mermas registradas')+'\n\n'+L;
  var w=window.open('','_blank','width=640,height=720');
  w.document.write('<!DOCTYPE html><html><head><title>Reporte</title><style>body{font-family:\'Courier New\',monospace;font-size:12px;padding:20px;white-space:pre;line-height:1.7}@media print{body{padding:10px}}</style></head><body>'+txt+'<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}

// ══════════════════════════════════════════
// PERSISTENCIA
// ══════════════════════════════════════════
function saveLS(){
  try{
    localStorage.setItem('cachorritos_v2',JSON.stringify({
      prods:S.prods,ventas:S.ventas,clis:S.clis,provs:S.provs,
      entradas:S.entradas,mermas:S.mermas,ajustes:S.ajustes,
      caja:S.caja,neg:S.neg,nid:NID
    }));
  }catch(e){console.log('No se pudo guardar:',e);}
}
function loadLS(){
  try{
    var raw=localStorage.getItem('cachorritos_v2');
    if(!raw)return;
    var d=JSON.parse(raw);
    if(d.prods)S.prods=d.prods;
    if(d.ventas)S.ventas=d.ventas;
    if(d.clis)S.clis=d.clis;
    if(d.provs)S.provs=d.provs;
    if(d.entradas)S.entradas=d.entradas;
    if(d.mermas)S.mermas=d.mermas;
    if(d.ajustes)S.ajustes=d.ajustes;
    if(d.caja)S.caja=d.caja;
    if(d.neg)S.neg=d.neg;
    if(d.nid)NID=d.nid;
  }catch(e){console.log('Error cargando datos:',e);}
}

loadLS();
