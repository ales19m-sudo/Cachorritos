<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cachorritos — De la Chacra a tu Olla</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cachorritos">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --green:#1a6b3a;--green-d:#0f4a27;--green-l:#e8f5ee;--green-t:#c8e6d4;
  --amber:#92400e;--amber-l:#fef3c7;
  --red:#991b1b;--red-l:#fee2e2;
  --blue:#1e40af;--blue-l:#dbeafe;
  --gray:#374151;--gray-l:#f9fafb;--gray-m:#6b7280;--gray-b:#e5e7eb;
  --radius:8px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111827;font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:230px;background:#fff;border-right:1px solid var(--gray-b);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px;border-bottom:1px solid var(--gray-b);display:flex;align-items:center;gap:10px}
.logo-ic{font-size:28px;background:var(--green-l);width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text .n{font-size:14px;font-weight:700;color:var(--green-d)}
.logo-text .s{font-size:10px;color:var(--gray-m);text-transform:uppercase;letter-spacing:.5px}
.cj{padding:8px 14px;border-bottom:1px solid var(--gray-b);display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;transition:background .1s}
.cj:hover{background:var(--gray-l)}
.cj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec{padding:12px 14px 4px;font-size:10px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.7px}
.nav{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:13px;color:#374151;transition:background .1s;user-select:none;border-radius:0}
.nav:hover{background:var(--gray-l)}
.nav.on{background:var(--green-l);color:var(--green-d);font-weight:600}
.nav i{font-size:17px;width:20px;flex-shrink:0}
.nbg{margin-left:auto;font-size:10px;padding:2px 6px;border-radius:20px;background:var(--red-l);color:var(--red);font-weight:600}
.sb-sp{flex:1}
.sb-bot{border-top:1px solid var(--gray-b);padding:4px 0}

/* MAIN */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--gray-b);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
.topbar-t{font-size:16px;font-weight:600;flex:1;color:#111827}
.cnt{flex:1;overflow-y:auto;padding:16px;background:#f3f4f6}

/* CARDS */
.card{background:#fff;border:1px solid var(--gray-b);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-t{font-size:12px;font-weight:600;color:var(--gray-m);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.5px;flex-wrap:wrap;gap:6px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}

/* METRICS */
.met{background:var(--gray-l);border:1px solid var(--gray-b);border-radius:var(--radius);padding:14px}
.met-l{font-size:11px;color:var(--gray-m);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.met-v{font-size:22px;font-weight:700;line-height:1}
.met-s{font-size:11px;color:var(--gray-m);margin-top:4px}

/* BADGES */
.bd{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.bd-ok{background:#d1fae5;color:#065f46}
.bd-w{background:#fef3c7;color:#92400e}
.bd-d{background:#fee2e2;color:#991b1b}
.bd-i{background:#dbeafe;color:#1e40af}
.bd-g{background:#f3f4f6;color:#6b7280}
.tag{font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-b);color:var(--gray-m);display:inline-block}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--gray-b);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;background:#fff;color:#374151;font-family:inherit;white-space:nowrap;transition:all .15s;font-weight:500}
.btn:hover{background:var(--gray-l);border-color:#9ca3af}
.btn-p{background:#1e40af;color:#fff;border-color:transparent}.btn-p:hover{background:#1d3fa0}
.btn-s{background:#065f46;color:#fff;border-color:transparent}.btn-s:hover{background:#054f39}
.btn-w{background:#92400e;color:#fff;border-color:transparent}.btn-w:hover{background:#7a3510}
.btn-d{background:#991b1b;color:#fff;border-color:transparent}.btn-d:hover{background:#7f1d1d}
.btn-g{background:var(--green-d);color:#fff;border-color:transparent}.btn-g:hover{background:#0d3d21}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn-fl{width:100%;justify-content:center}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--gray-m);border-bottom:2px solid var(--gray-b);text-transform:uppercase;letter-spacing:.3px;background:var(--gray-l);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--gray-b);vertical-align:middle}
.tbl tbody tr:last-child td{border:none}
.tbl tbody tr:hover td{background:#f9fafb}
.tw{overflow-x:auto;border-radius:var(--radius-sm)}
.ta{display:flex;gap:4px;flex-wrap:nowrap}

/* FORMS */
.fr{display:grid;gap:10px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.4px}
.fi{padding:8px 10px;border:1px solid var(--gray-b);border-radius:var(--radius-sm);font-size:13px;background:#fff;color:#111827;font-family:inherit;width:100%;transition:border .15s}
.fi:focus{outline:none;border-color:#1a6b3a;box-shadow:0 0 0 3px rgba(26,107,58,.1)}
.fi[readonly]{background:var(--gray-l);color:var(--gray-m)}
.fi-s{background:#d1fae5!important;color:#065f46!important;font-weight:600;border-color:#6ee7b7!important}
.fi-i{background:#dbeafe!important;color:#1e40af!important;font-weight:600;border-color:#93c5fd!important}
.fi-d{background:#fee2e2!important;color:#991b1b!important;font-weight:600;border-color:#fca5a5!important}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;backdrop-filter:blur(2px)}
.mo{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-b);padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo-t{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#111827}
.mo-f{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* ALERTS */
.al{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:13px;font-weight:500}
.al i{flex-shrink:0;margin-top:1px;font-size:15px}
.al-d{background:var(--red-l);color:var(--red)}
.al-w{background:var(--amber-l);color:var(--amber)}
.al-s{background:#d1fae5;color:#065f46}
.al-i{background:var(--blue-l);color:var(--blue)}

/* MISC */
.dv{height:1px;background:var(--gray-b);margin:14px 0}
.empty{text-align:center;padding:32px;color:var(--gray-m);font-size:13px}
.cs{color:#065f46}.cd{color:#991b1b}.cw{color:#92400e}.ci{color:#1e40af}.cm{color:#6b7280}
.fw6{font-weight:600}.fw7{font-weight:700}
.bar{background:var(--gray-b);border-radius:20px;height:7px;flex:1;min-width:40px}
.bar-f{height:7px;border-radius:20px}
.tabs{display:flex;border-bottom:2px solid var(--gray-b);margin-bottom:16px;gap:4px}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--gray-m);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none;font-weight:500;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.tab:hover{color:#111827;background:var(--gray-l)}
.tab.on{color:var(--green-d);border-color:var(--green-d);font-weight:700;background:var(--green-l)}
.blt{font-family:'Courier New',monospace;font-size:11.5px;background:var(--gray-l);padding:14px;border-radius:var(--radius-sm);white-space:pre;line-height:1.8;border:1px dashed var(--gray-b);overflow-x:auto}
.fl-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-b);font-size:13px}
.fl-row:last-child{border:none}
.vrow{display:grid;grid-template-columns:2fr 70px 95px 95px 30px;gap:8px;align-items:end;margin-bottom:8px}
.pstat{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}

@media(max-width:768px){
  .sb{width:100%;height:auto;flex-direction:row;overflow-x:auto;flex-shrink:0}
  .app{flex-direction:column}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="logo">
      <div class="logo-ic">🐾</div>
      <div class="logo-text">
        <div class="n">Cachorritos</div>
        <div class="s">De la Chacra a tu Olla</div>
      </div>
    </div>
    <div class="cj" onclick="go('caja')">
      <span class="cj-dot" id="cj-dot" style="background:#991b1b"></span>
      <span id="cj-txt" style="color:#6b7280">Caja cerrada</span>
    </div>
    <div class="sec">Operaciones</div>
    <div class="nav" data-p="dashboard"><i class="ti ti-layout-dashboard"></i>Dashboard</div>
    <div class="nav" data-p="caja"><i class="ti ti-cash-register"></i>Caja del día</div>
    <div class="nav" data-p="ventas"><i class="ti ti-shopping-cart"></i>Ventas</div>
    <div class="sec">Inventario</div>
    <div class="nav" data-p="inventario"><i class="ti ti-package"></i>Inventario</div>
    <div class="sec">Clientes</div>
    <div class="nav" data-p="clientes"><i class="ti ti-users"></i>Clientes y cobros<span class="nbg" id="cq-badge" style="display:none">0</span></div>
    <div class="sec">Proveedores</div>
    <div class="nav" data-p="provs"><i class="ti ti-truck"></i>Proveedores</div>
    <div class="sec">Análisis</div>
    <div class="nav" data-p="reportes"><i class="ti ti-chart-bar"></i>Reportes</div>
    <div class="nav" data-p="boletas"><i class="ti ti-receipt"></i>Boletas</div>
    <div class="sb-sp"></div>
    <div class="sb-bot">
      <div class="nav" style="color:#991b1b" onclick="cierreDia()"><i class="ti ti-moon"></i>Cerrar día</div>
    </div>
  </aside>
  <main class="mn">
    <div class="topbar">
      <span class="topbar-t" id="tt">Dashboard</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g" id="tb" style="display:none" onclick="topAct()"><i class="ti ti-plus"></i><span id="tbl">Acción</span></button>
      </div>
    </div>
    <div class="cnt" id="cnt"></div>
  </main>
</div>
<div id="MR"></div>

<script>
'use strict';
// ─── UTILS ───
const $=id=>document.getElementById(id);
const M=h=>{$('MR').innerHTML=h};
const cM=()=>M('');
const hoy=()=>new Date().toISOString().split('T')[0];
const hora=()=>new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
const dDesde=f=>Math.max(0,Math.floor((new Date()-new Date(f))/864e5));
const mon=v=>'S/ '+Number(v||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=(v,t)=>t?Math.min(100,Math.round(v/t*100)):0;

// ─── STATE ───
let NID=300;
const nid=()=>++NID;

const S={
  pg:'dashboard',tab:'',
  neg:{nom:'Cachorritos',sl:'De la Chacra a tu Olla',ruc:'10456789012',dir:'Mercado Santa Rosa, Puesto 14',tel:'987-654-321'},
  caja:{open:false,fecha:null,ini:0,gastos:[]},
  stMin:12,
  prods:[
    {id:1,nom:'Yungay A1',cat:'Papa',qty:80,costo:85,pMay:105,pMin:120,prov:'Don Raúl',fIng:'2025-05-10',dAl:7},
    {id:2,nom:'Yungay A2',cat:'Papa',qty:60,costo:80,pMay:100,pMin:115,prov:'Don Raúl',fIng:'2025-05-10',dAl:7},
    {id:3,nom:'Canchan',cat:'Papa',qty:45,costo:90,pMay:110,pMin:125,prov:'Familia Quispe',fIng:'2025-05-11',dAl:10},
    {id:4,nom:'Huayro',cat:'Papa',qty:30,costo:100,pMay:120,pMin:140,prov:'Familia Quispe',fIng:'2025-05-11',dAl:10},
    {id:5,nom:'Papa Amarilla',cat:'Papa',qty:20,costo:120,pMay:145,pMin:165,prov:'Don Raúl',fIng:'2025-05-12',dAl:5},
    {id:6,nom:'Camote',cat:'Camote',qty:15,costo:50,pMay:63,pMin:75,prov:'Mercado Central',fIng:'2025-05-12',dAl:8},
    {id:7,nom:'Yuca',cat:'Yuca',qty:8,costo:40,pMay:52,pMin:62,prov:'Familia Quispe',fIng:'2025-05-09',dAl:7},
  ],
  ventas:[
    {id:1,items:[{nom:'Yungay A1',pid:1,qty:5,precio:120,costo:85}],tipo:'minorista',cli:'Mostrador',pago:'contado',total:600,costoT:425,util:175,fecha:'2025-05-14',hora:'08:30',anu:false,motAnu:''},
    {id:2,items:[{nom:'Papa Amarilla',pid:5,qty:3,precio:165,costo:120}],tipo:'minorista',cli:'Rosa Mamani',pago:'yape',total:495,costoT:360,util:135,fecha:'2025-05-14',hora:'09:15',anu:false,motAnu:''},
    {id:3,items:[{nom:'Canchan',pid:3,qty:10,precio:110,costo:90}],tipo:'mayorista',cli:'Bodega El Sol',pago:'crédito',total:1100,costoT:900,util:200,fecha:'2025-05-13',hora:'14:00',anu:false,motAnu:''},
    {id:4,items:[{nom:'Huayro',pid:4,qty:4,precio:140,costo:100}],tipo:'minorista',cli:'Mostrador',pago:'contado',total:560,costoT:400,util:160,fecha:'2025-05-13',hora:'10:00',anu:false,motAnu:''},
  ],
  clis:[
    {id:1,nom:'Bodega El Sol',tipo:'mayorista',deuda:800,limC:2000,dSinP:5,cuotas:[{id:101,m:400,v:'2025-05-20',p:false},{id:102,m:400,v:'2025-06-01',p:false}],hist:[{f:'2025-05-01',m:1100,t:'deuda'},{f:'2025-05-10',m:300,t:'pago'}]},
    {id:2,nom:'Rosa Mamani',tipo:'minorista',deuda:320,limC:500,dSinP:9,cuotas:[{id:103,m:320,v:'2025-05-25',p:false}],hist:[{f:'2025-05-05',m:320,t:'deuda'}]},
    {id:3,nom:'Don Carlos',tipo:'mayorista',deuda:0,limC:3000,dSinP:0,cuotas:[],hist:[{f:'2025-04-20',m:600,t:'deuda'},{f:'2025-04-30',m:600,t:'pago'}]},
  ],
  provs:[
    {id:1,nom:'Don Raúl',tel:'987654321',dir:'Mercado Mayorista Lima',compras:[{id:1,f:'2025-05-10',det:'Yungay A1 x50, Yungay A2 x30',tot:6350,pag:true},{id:2,f:'2025-04-15',det:'Papa Amarilla x20',tot:2400,pag:true}]},
    {id:2,nom:'Familia Quispe',tel:'912345678',dir:'Huancayo',compras:[{id:3,f:'2025-05-11',det:'Canchan x45, Huayro x30',tot:7050,pag:false}]},
    {id:3,nom:'Mercado Central',tel:'956781234',dir:'Lima Centro',compras:[{id:4,f:'2025-05-12',det:'Camote x15',tot:750,pag:true}]},
  ],
  entradas:[
    {id:1,pNom:'Yungay A1',qty:80,cu:85,ct:6800,prov:'Don Raúl',f:'2025-05-10'},
    {id:2,pNom:'Papa Amarilla',qty:20,cu:120,ct:2400,prov:'Don Raúl',f:'2025-05-12'},
    {id:3,pNom:'Camote',qty:15,cu:50,ct:750,prov:'Mercado Central',f:'2025-05-12'},
  ],
  mermas:[{id:1,pNom:'Yuca',pid:7,qty:2,mot:'podrido',f:'2025-05-14'}],
  ajustes:[],
};

// ─── NAV ───
const pgCfg={
  dashboard:{t:'Panel principal',btn:'Nueva venta'},
  caja:{t:'Caja del día',btn:null},
  ventas:{t:'Ventas',btn:'Nueva venta'},
  inventario:{t:'Inventario',btn:'Agregar producto'},
  clientes:{t:'Clientes y cobros',btn:'Nuevo cliente'},
  provs:{t:'Proveedores',btn:'Nuevo proveedor'},
  reportes:{t:'Reportes y exportación',btn:null},
  boletas:{t:'Boletas y comprobantes',btn:null},
};

function alertN(){
  let n=0;
  S.prods.forEach(p=>{if(p.qty<S.stMin)n++;if(dDesde(p.fIng)>=p.dAl)n++;});
  S.clis.forEach(c=>c.cuotas.forEach(q=>{if(!q.p&&new Date(q.v)<=new Date(Date.now()+3*864e5))n++;}));
  return n;
}

function go(pg,tab=''){
  S.pg=pg;S.tab=tab;
  const c=pgCfg[pg]||{t:pg,btn:null};
  $('tt').textContent=c.t;
  const b=$('tb');
  if(c.btn){b.style.display='';$('tbl').textContent=c.btn;}
  else b.style.display='none';
  document.querySelectorAll('.nav[data-p]').forEach(el=>el.classList.toggle('on',el.dataset.p===pg));
  const op=S.caja.open;
  $('cj-dot').style.background=op?'#065f46':'#991b1b';
  $('cj-txt').textContent=op?'Caja abierta':'Caja cerrada';
  $('cj-txt').style.color=op?'#065f46':'#6b7280';
  const cp=S.clis.flatMap(c=>c.cuotas.filter(q=>!q.p&&new Date(q.v)<=new Date(Date.now()+3*864e5))).length;
  $('cq-badge').textContent=cp;$('cq-badge').style.display=cp?'':'none';
  rend();
}

function topAct(){
  if(S.pg==='dashboard'||S.pg==='ventas'){S.tab='nueva';rend();}
  else if(S.pg==='inventario')mNuevoProd();
  else if(S.pg==='clientes')mNuevoCli();
  else if(S.pg==='provs')mNuevoProv();
}

let vIC=1;
function rend(){
  const pages={dashboard:rDash,caja:rCaja,ventas:rVentas,inventario:rInv,clientes:rClis,provs:rProvs,reportes:rRep,boletas:rBoletas};
  $('cnt').innerHTML=(pages[S.pg]||rDash)();
  if(S.pg==='ventas'&&(S.tab===''||S.tab==='nueva'))setTimeout(()=>{upAll();calcV();},0);
}

// ═══ DASHBOARD ═══
function rDash(){
  const vH=S.ventas.filter(v=>v.fecha===hoy()&&!v.anu);
  const tH=vH.reduce((a,v)=>a+v.total,0),uH=vH.reduce((a,v)=>a+v.util,0);
  const gH=S.caja.gastos.reduce((a,g)=>a+g.m,0);
  const dT=S.clis.reduce((a,c)=>a+c.deuda,0);
  const stB=S.prods.filter(p=>p.qty<S.stMin);
  const cuP=S.clis.flatMap(c=>c.cuotas.filter(q=>!q.p&&new Date(q.v)<=new Date(Date.now()+3*864e5)).map(q=>({...q,cn:c.nom})));
  const pm={};S.ventas.filter(v=>!v.anu).forEach(v=>v.items.forEach(i=>{pm[i.nom]=(pm[i.nom]||0)+i.qty;}));
  const top=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const mx=top[0]?top[0][1]:1;
  const aN=alertN();
  return `

function addItem(){
  const idx=vIC++;
  const d=document.createElement('div');
  d.className='vrow';d.id='vr'+idx;
  d.innerHTML=`
    <div class="fg"><label class="fl">Producto</label><select class="fi" id="vp${idx}" onchange="upPrice(${idx})">${S.prods.map(p=>`<option value="${p.id}">${p.nom} (${p.qty})</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Cant.</label><input type="number" class="fi" id="vq${idx}" value="1" min="1" oninput="calcV()"></div>
    <div class="fg"><label class="fl">Precio S/</label><input type="number" class="fi" id="vpr${idx}" oninput="calcV()"></div>
    <div class="fg"><label class="fl">Subtotal</label><input class="fi fi-i" id="vs${idx}" readonly></div>
    <div class="fg"><label class="fl" style="opacity:0">—</label><button class="btn btn-xs btn-d" onclick="remItem(${idx})"><i class="ti ti-x"></i></button></div>`;
  $('v-items').appendChild(d);
  upPrice(idx);calcV();
}

function remItem(i){const el=$('vr'+i);if(el){el.remove();calcV();}}

function upPrice(idx){
  const t=$('v-tipo')?.value||'minorista';
  const sel=$('vp'+idx);if(!sel)return;
  const p=S.prods.find(x=>x.id===parseInt(sel.value));
  if(p&&$('vpr'+idx))$('vpr'+idx).value=t==='mayorista'?p.pMay:p.pMin;
  calcV();
}
function upAll(){for(let i=0;i<30;i++){if(!$('vp'+i))continue;upPrice(i);}calcV();}

function calcV(){
  let tot=0,cos=0;
  for(let i=0;i<30;i++){
    const pEl=$('vp'+i);if(!pEl)continue;
    const q=parseFloat($('vq'+i)?.value)||0,pr=parseFloat($('vpr'+i)?.value)||0;
    const p=S.prods.find(x=>x.id===parseInt(pEl.value));
    const sub=q*pr;const sEl=$('vs'+i);if(sEl)sEl.value=mon(sub);
    tot+=sub;if(p)cos+=q*p.costo;
  }
  if($('vtot'))$('vtot').value=mon(tot);
  if($('vcos'))$('vcos').value=mon(cos);
  if($('vuti'))$('vuti').value=mon(tot-cos);
}

function saveV(boleta){
  const tipo=$('v-tipo')?.value||'minorista',cli=$('v-cli')?.value||'Mostrador',pago=$('v-pago')?.value||'contado';
  const items=[];let tot=0,cos=0;
  for(let i=0;i<30;i++){
    const pEl=$('vp'+i);if(!pEl)continue;
    const qty=parseInt($('vq'+i)?.value)||0,precio=parseFloat($('vpr'+i)?.value)||0;
    const p=S.prods.find(x=>x.id===parseInt(pEl.value));
    if(!p||qty<1)continue;
    if(qty>p.qty){const m=$('vmsg');if(m){m.textContent='⚠ Sin stock: '+p.nom+' ('+p.qty+' disponibles)';m.className='cd';}return;}
    items.push({nom:p.nom,pid:p.id,qty,precio,costo:p.costo});
    tot+=qty*precio;cos+=qty*p.costo;
  }
  if(!items.length)return;
  items.forEach(it=>{const p=S.prods.find(x=>x.id===it.pid);if(p)p.qty-=it.qty;});
  const nv={id:nid(),items,tipo,cli,pago,total:tot,costoT:cos,util:tot-cos,fecha:hoy(),hora:hora(),anu:false,motAnu:''};
  S.ventas.push(nv);
  if(pago==='crédito'||pago==='partes'){const c=S.clis.find(x=>x.nom===cli);if(c){c.deuda+=tot;c.hist.push({f:hoy(),m:tot,t:'deuda'});}}
  vIC=1;
  saveLS();
  if(boleta){verBoleta(nv.id);}
  else{const m=$('vmsg');if(m){m.textContent='✅ Venta registrada correctamente';m.className='cs';}setTimeout(()=>rend(),1000);}
}

function rFlujo(){
  const vA=S.ventas.filter(v=>!v.anu);
  const ing=vA.filter(v=>v.pago!=='crédito'&&v.pago!=='partes').reduce((a,v)=>a+v.total,0);
  const cr=vA.filter(v=>v.pago==='crédito'||v.pago==='partes').reduce((a,v)=>a+v.total,0);
  const gas=S.caja.gastos.reduce((a,g)=>a+g.m,0);
  const compT=S.provs.flatMap(p=>p.compras).reduce((a,c)=>a+c.tot,0);
  const compPend=S.provs.flatMap(p=>p.compras.filter(c=>!c.pag)).reduce((a,c)=>a+c.tot,0);
  const dT=S.clis.reduce((a,c)=>a+c.deuda,0);
  return `
<div class="g3">
  <div class="met"><div class="met-l">💰 Ingresos cobrados</div><div class="met-v cs">${mon(ing)}</div><div class="met-s">efectivo + yape</div></div>
  <div class="met"><div class="met-l">📤 Gastos operativos</div><div class="met-v cd">${mon(gas)}</div><div class="met-s">del período</div></div>
  <div class="met"><div class="met-l">📊 Saldo neto</div><div class="met-v ${ing-gas>=0?'cs':'cd'}">${mon(ing-gas)}</div><div class="met-s">ingresos − gastos</div></div>
</div>
<div class="g2">
  <div class="card">
    <div class="card-t">Resumen de flujo de caja</div>
    <div class="fl-row"><span class="cm">+ Ventas cobradas (contado + Yape)</span><span class="fw6 cs">+${mon(ing)}</span></div>
    <div class="fl-row"><span class="cm">⏳ Crédito pendiente de cobro</span><span class="fw6 cw">${mon(cr)}</span></div>
    <div class="fl-row"><span class="cm">📋 Deudas de clientes</span><span class="fw6 cw">${mon(dT)}</span></div>
    <div class="fl-row"><span class="cm">− Gastos operativos del negocio</span><span class="fw6 cd">−${mon(gas)}</span></div>
    <div class="fl-row" style="border:none;font-weight:700;font-size:14px"><span>Saldo real disponible</span><span class="${ing-gas>=0?'cs':'cd'}">${mon(ing-gas)}</span></div>
  </div>
  <div class="card">
    <div class="card-t">Compras a proveedores</div>
    ${S.provs.map(p=>{const t=p.compras.reduce((a,c)=>a+c.tot,0),pd=p.compras.filter(c=>!c.pag).reduce((a,c)=>a+c.tot,0);return `<div class="fl-row"><span class="fw6">${p.nom}</span><div style="text-align:right"><div class="fw6">${mon(t)}</div>${pd>0?`<div class="cd" style="font-size:11px">Pendiente: ${mon(pd)}</div>`:''}</div></div>`;}).join('')}
    <div class="fl-row" style="border:none;font-weight:700"><span>Total compras</span><span class="cd">${mon(compT)}</span></div>
    ${compPend>0?`<div class="al al-d" style="margin-top:8px;margin-bottom:0"><i class="ti ti-alert-triangle"></i>Debes a proveedores: <b>${mon(compPend)}</b></div>`:''}
  </div>
</div>`;
}

function rUtil(){
  const vA=S.ventas.filter(v=>!v.anu);
  const uT=vA.reduce((a,v)=>a+v.util,0),vT=vA.reduce((a,v)=>a+v.total,0),cT=vA.reduce((a,v)=>a+v.costoT,0);
  const mg=vT>0?Math.round(uT/vT*100):0;
  const pm={};
  vA.forEach(v=>v.items.forEach(i=>{if(!pm[i.nom])pm[i.nom]={qty:0,venta:0,costo:0,util:0};pm[i.nom].qty+=i.qty;pm[i.nom].venta+=i.qty*i.precio;pm[i.nom].costo+=i.qty*i.costo;pm[i.nom].util+=i.qty*(i.precio-i.costo);}));
  const arr=Object.entries(pm).sort((a,b)=>b[1].util-a[1].util);
  const mx=arr[0]?arr[0][1].util:1;
  return `
<div class="g3">
  <div class="met"><div class="met-l">📈 Utilidad bruta total</div><div class="met-v cs">${mon(uT)}</div></div>
  <div class="met"><div class="met-l">📊 Margen general</div><div class="met-v cs">${mg}%</div></div>
  <div class="met"><div class="met-l">💸 Costo de ventas</div><div class="met-v cd">${mon(cT)}</div></div>
</div>
<div class="card">
  <div class="card-t">Utilidad por producto</div>
  <div class="tw"><table class="tbl">
    <thead><tr><th>#</th><th>Producto</th><th>Sacos vendidos</th><th>Ingresos</th><th>Costo</th><th>Utilidad</th><th>Margen</th><th>Rendimiento</th></tr></thead>
    <tbody>${arr.map(([n,d],i)=>{const mg2=d.venta>0?Math.round(d.util/d.venta*100):0;return `<tr>
      <td class="cm">${i+1}</td><td class="fw6">${n}</td><td>${d.qty}</td>
      <td>${mon(d.venta)}</td><td class="cd">${mon(d.costo)}</td>
      <td class="cs fw6">+${mon(d.util)}</td><td class="cs fw6">${mg2}%</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="bar" style="min-width:80px"><div class="bar-f" style="width:${pct(d.util,mx)}%;background:#065f46"></div></div><span class="cm" style="font-size:11px">${pct(d.util,mx)}%</span></div></td>
    </tr>`;}).join('')}</tbody>
  </table></div>
</div>`;
}

function txtBoleta(v){
  if(!v)return'';
  const n=S.neg,L=32;
  const c=(t,w=L)=>{const p=Math.max(0,Math.floor((w-t.length)/2));return' '.repeat(p)+t};
  const r=(l,r,w=L)=>{const sp=Math.max(1,w-l.length-r.length);return l+' '.repeat(sp)+r};
  const sep='─'.repeat(L);
  return `${c(n.nom)}\n${c(n.sl)}\n${c('RUC: '+n.ruc)}\n${c(n.dir)}\n${sep}\n${c('COMPROBANTE DE VENTA')}\n${sep}\nNº: ${String(v.id).padStart(5,'0')}         ${v.fecha}\nCliente: ${v.cli}\nTipo: ${v.tipo.toUpperCase()}     Pago: ${v.pago}\n${sep}\n${v.items.map(i=>`${i.nom.substring(0,13).padEnd(13)} ${String(i.qty).padStart(2)} x ${mon(i.precio)}`).join('\n')}\n${sep}\n${r('SUBTOTAL:',mon(v.total))}\n${r('UTILIDAD:','+'+mon(v.util))}\n${sep}\n${c('¡Gracias por su compra!')}\n${c('De la Chacra a tu Olla 🐾')}`;
}
function updBlt(){const p=$('blt-prev');if(p&&S.ventas.length)p.textContent=txtBoleta(S.ventas[S.ventas.length-1]);}
function verBoleta(id){
  var v=S.ventas.find(function(x){return x.id===id;});if(!v)return;
  var txt=txtBoleta(v);
  var num=String(v.id).padStart(5,'0');
  var html='<div class="ov" onclick="if(event.target===this)cM()"><div class="mo">';
  html+='<div class="mo-t"><i class="ti ti-receipt"></i> Boleta #'+num+'</div>';
  html+='<div class="blt">'+txt+'</div>';
  html+='<div class="mo-f">';
  html+='<button class="btn btn-g" onclick="impBoleta('+id+')"><i class="ti ti-printer"></i> Imprimir / PDF</button>';
  html+='<button class="btn btn-p" onclick="dlBoleta('+id+')"><i class="ti ti-download"></i> .txt</button>';
  html+='<button class="btn" onclick="cM()">Cerrar</button>';
  html+='</div></div></div>';
  M(html);
}
